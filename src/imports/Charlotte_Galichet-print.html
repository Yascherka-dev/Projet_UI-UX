<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlotte Galichet — Prototype (Print)</title>

  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    /* ========= PRINT-FRIENDLY OVERRIDES ========= */

    /* Reveal everything immediately — kill IntersectionObserver gating */
    .reveal, .reveal-left, .reveal-right {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }
    .divider-line { transform: scaleX(1) !important; animation: none !important; }
    .ia-highlight::after {
      transform: scaleX(1) !important;
      animation: none !important;
    }

    /* Disable floating + drifting backgrounds for print clarity */
    .mesh-bg { animation: none !important; }
    [style*="animation: float"], .scroll-indicator,
    [style*="trackDrop"] { animation: none !important; }
    .scroll-indicator { display: none !important; }

    /* Each "screen" sits in its own print page */
    .print-screen {
      page-break-after: always;
      break-after: page;
      position: relative;
      width: 100%;
    }
    .print-screen:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    /* Section/screen label for print */
    .print-label {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #FAFAFA;
      border-bottom: 1px solid #E5E7EB;
      padding: 14px 32px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .print-label strong { color: #111827; font-weight: 600; }

    /* Force-print background colors / images */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Hide site Nav (we'll show our own label instead in print render) */
    .print-nav-hidden header { display: none !important; }

    /* Keep cards & sections together where possible */
    .card, .card-expertise, .article-card,
    .glass, .faq-item {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* ========= @page rules ========= */
    @media print {
      @page {
        size: A3 portrait;
        margin: 0;
      }
      body, html {
        background: white !important;
      }
      .print-screen {
        margin: 0 !important;
      }
      .print-label {
        position: relative !important;
      }
    }

    /* Screen preview — show pages stacked */
    @media screen {
      body {
        background: #E5E7EB;
        padding: 32px 0;
      }
      .print-screen {
        background: white;
        max-width: 1280px;
        margin: 0 auto 32px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
        border-radius: 6px;
      }
    }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="print-nav-hidden">
  <div id="root"></div>

  <!-- Shared first, then pages -->
  <script type="text/babel" data-presets="env,react" src="shared.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="page-home.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="page-about.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="page-domains.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="page-articles.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="page-contact.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    /* Print app — renders all 6 pages stacked with page breaks */

    // Inert navigation (no-op router for print)
    const noopNavigate = () => {};

    const SCREENS = [
      { id: "home",         label: "01 — Home",         Component: HomePage,         needsSubmission: false },
      { id: "about",        label: "02 — À propos",     Component: AboutPage,        needsSubmission: false },
      { id: "domains",      label: "03 — Domaines & FAQ", Component: DomainsPage,    needsSubmission: false },
      { id: "articles",     label: "04 — Articles",     Component: ArticlesPage,     needsSubmission: false },
      { id: "contact",      label: "05 — Contact",      Component: ContactPage,      needsSubmission: false },
      { id: "confirmation", label: "06 — Confirmation", Component: ConfirmationPage, needsSubmission: true  },
    ];

    // Stub submission for confirmation screen
    const SAMPLE_SUBMISSION = {
      type: "rdv",
      date: { day: 18, month: 5, year: 2026 }, // 18 juin 2026
      slot: "10:30",
    };

    function PrintApp() {
      return (
        <>
          {SCREENS.map((s) => {
            const C = s.Component;
            const extra = s.needsSubmission ? { submission: SAMPLE_SUBMISSION } : {};
            return (
              <section key={s.id} className="print-screen" data-screen-label={s.label}>
                <div className="print-label">
                  <strong>Charlotte Galichet · {s.label}</strong>
                  <span>cabinet-galichet.fr / {s.id}</span>
                </div>
                <C onNavigate={noopNavigate} onSubmitForm={noopNavigate} {...extra} />
                {s.id !== "confirmation" && <Footer onNavigate={noopNavigate}/>}
              </section>
            );
          })}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp/>);

    /* ========= Auto-print after fonts + JSX ready ========= */
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait an extra beat for React to mount + images to settle
      await new Promise((r) => setTimeout(r, 1500));
      window.print();
    })();
  </script>
</body>
</html>
